<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>化学基礎板書一覧</title>
<style>
  :root {
    --primary: #2563eb;
    --bg: #f1f5f9;
    --card: #ffffff;
    --text: #1e293b;
    --muted: #64748b;
    --border: #e2e8f0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 32px 16px 64px;
  }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 {
    font-size: 1.5rem;
    color: var(--primary);
    text-align: center;
    margin-bottom: 32px;
  }
  .hen {
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--primary);
    margin: 40px 0 8px;
    padding-bottom: 6px;
    border-bottom: 3px solid var(--primary);
  }
  .hen:first-of-type { margin-top: 0; }
  .chapter {
    font-size: 1rem;
    font-weight: 700;
    color: var(--text);
    margin: 24px 0 10px;
    padding-left: 10px;
    border-left: 4px solid var(--primary);
  }
  ul.quiz-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  ul.quiz-list li a {
    display: block;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    color: var(--text);
    text-decoration: none;
    font-size: .97rem;
    transition: border-color .15s, background .15s, transform .1s;
  }
  ul.quiz-list li a:hover {
    border-color: var(--primary);
    background: #eff6ff;
    transform: translateX(2px);
  }
  ul.quiz-list li a::before {
    content: "📄 ";
  }
  .nav-link {
    display: block;
    text-align: center;
    margin-top: 40px;
    color: var(--primary);
    font-size: .9rem;
    text-decoration: none;
  }
  .nav-link:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="wrap">
  <h1>化学基礎板書一覧</h1>

  <div class="hen">第1編　物質の構成と化学結合</div>

  <div class="chapter">第1章　物質の構成</div>
  <ul class="quiz-list">
    <li><a href="板書.pdf">物質の構成</a></li>
  </ul>

  <div class="chapter">第2章　物質の構成粒子</div>
  <ul class="quiz-list">
    <li><a href="第2章 物質の構成粒子(板書）.pdf">物質の構成粒子</a></li>
  </ul>

  <div class="chapter">第3章　粒子の結合</div>
  <ul class="quiz-list">
    <li><a href="イオン結合とイオン結晶の板書.pdf">イオン結合とイオン結晶</a></li>
    <li><a href="共有結合の板書.pdf">共有結合と分子</a></li>
    <li><a href="分子間力と分子結晶の板書.pdf">分子間力と分子結晶</a></li>
    <li><a href="共有結晶と金属結晶.pdf">共有結晶と金属結晶</a></li>
  </ul>

  <a href="index.html" class="nav-link">← クイズ一覧に戻る</a>
</div>
</body>
</html>
