<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>化学基礎クイズ｜イオン結合・イオン結晶・組成式と名称</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Helvetica Neue',Arial,'Hiragino Kaku Gothic ProN',sans-serif;background:#f0f4f8;color:#2d3748;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.wrap{width:100%;max-width:640px}
.card{background:#fff;border-radius:16px;padding:32px;box-shadow:0 4px 24px rgba(0,0,0,.08)}
#start h1{font-size:1.5rem;font-weight:700;color:#2b6cb0;margin-bottom:8px}
#start .sub{color:#718096;font-size:.95rem;margin-bottom:24px}
.total-badge{display:inline-block;padding:4px 14px;border-radius:20px;font-size:.8rem;font-weight:600;background:#ebf8ff;color:#2b6cb0;margin-bottom:24px}
.id-label{display:block;font-size:.85rem;font-weight:600;color:#4a5568;margin-bottom:6px}
.id-input{width:100%;padding:12px 14px;border:2px solid #e2e8f0;border-radius:10px;font-size:.95rem;margin-bottom:20px}
.id-input:focus{outline:none;border-color:#4299e1}
.start-btn{width:100%;padding:14px;background:linear-gradient(135deg,#4299e1,#3182ce);color:#fff;border:none;border-radius:10px;font-size:1.05rem;font-weight:700;cursor:pointer;transition:opacity .2s}
.start-btn:hover{opacity:.9}
.submit-status{margin-top:14px;text-align:center;font-size:.8rem;color:#a0aec0}
#quiz .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.progress-wrap{flex:1;height:8px;background:#e2e8f0;border-radius:4px;margin:0 12px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,#4299e1,#63b3ed);border-radius:4px;transition:width .3s}
.q-num{font-size:.85rem;color:#718096;white-space:nowrap}
.q-text{font-size:1.1rem;font-weight:600;line-height:1.6;margin-bottom:20px}
.choices{display:flex;flex-direction:column;gap:10px}
.choice-btn{padding:13px 16px;border:2px solid #e2e8f0;border-radius:10px;background:#fff;font-size:.95rem;cursor:pointer;text-align:left;transition:all .15s}
.choice-btn:hover:not(:disabled){border-color:#4299e1;background:#ebf8ff}
.choice-btn.correct{border-color:#48bb78;background:#f0fff4;color:#276749;font-weight:700}
.choice-btn.wrong{border-color:#fc8181;background:#fff5f5;color:#c53030}
.choice-btn:disabled{cursor:default}
.exp-box{margin-top:16px;padding:12px 16px;background:#fffbeb;border-left:4px solid #f6ad55;border-radius:0 8px 8px 0;font-size:.9rem;color:#7b341e;line-height:1.6;display:none}
.next-btn{margin-top:18px;width:100%;padding:13px;background:#4299e1;color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;display:none;transition:opacity .2s}
.next-btn:hover{opacity:.9}
#result .r-title{font-size:1.3rem;font-weight:700;text-align:center;margin-bottom:20px}
.donut-wrap{display:flex;justify-content:center;align-items:center;gap:24px;margin-bottom:24px}
.donut-svg{width:120px;height:120px}
.score-big{font-size:2.5rem;font-weight:800;color:#2b6cb0;line-height:1}
.score-sub{font-size:.9rem;color:#718096}
.pass-badge{display:inline-block;margin-top:8px;padding:3px 12px;border-radius:20px;font-size:.85rem;font-weight:700}
.pass-badge.pass{background:#f0fff4;color:#276749}
.pass-badge.fail{background:#fff5f5;color:#c53030}
.review-title{font-weight:700;margin-bottom:12px;color:#4a5568}
.review-list{display:flex;flex-direction:column;gap:8px;max-height:320px;overflow-y:auto}
.review-item{padding:12px;border:1px solid #e2e8f0;border-radius:8px}
.review-item .rq{font-size:.9rem;font-weight:600;margin-bottom:4px}
.review-item .ra{font-size:.85rem;color:#718096}
.review-item.miss .rq{color:#c53030}
.retry-btn{margin-top:20px;width:100%;padding:13px;background:linear-gradient(135deg,#4299e1,#3182ce);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;transition:opacity .2s}
.retry-btn:hover{opacity:.9}
.home-link{display:block;text-align:center;margin-top:14px;color:#4299e1;font-size:.85rem;text-decoration:none}
.home-link:hover{text-decoration:underline}
.hidden{display:none}
</style>
</head>
<body>
<div class="wrap">

<div id="start" class="card">
  <h1>化学基礎クイズ</h1>
  <p class="sub">イオン結合・イオン結晶の性質・組成式・名称の書き方｜毎回ランダム10問</p>
  <div class="total-badge" id="totalBadge"></div>
  <label class="id-label" for="studentId">学籍番号（学年・組・出席番号を半角4桁で／例：1年1組4番→1104）</label>
  <input class="id-input" id="studentId" placeholder="1104" inputmode="numeric" maxlength="4">
  <button class="start-btn" onclick="startQuiz()">スタート</button>
</div>

<div id="quiz" class="card hidden">
  <div class="header">
    <div class="progress-wrap"><div class="progress-bar" id="pbar"></div></div>
    <div class="q-num" id="qnum"></div>
  </div>
  <div id="qtext" class="q-text"></div>
  <div id="choices" class="choices"></div>
  <div id="exp" class="exp-box"></div>
  <button id="nextBtn" class="next-btn" onclick="next()">次の問題へ →</button>
</div>

<div id="result" class="card hidden">
  <div class="r-title">結果発表</div>
  <div class="donut-wrap">
    <svg class="donut-svg" viewBox="0 0 36 36">
      <circle cx="18" cy="18" r="15.9" fill="none" stroke="#e2e8f0" stroke-width="3.8"/>
      <circle id="donut-arc" cx="18" cy="18" r="15.9" fill="none" stroke="#4299e1" stroke-width="3.8"
        stroke-dasharray="0 100" stroke-linecap="round" transform="rotate(-90 18 18)"/>
    </svg>
    <div>
      <div class="score-big" id="scoreBig"></div>
      <div class="score-sub">/ 10問正解</div>
      <div class="pass-badge" id="passBadge"></div>
    </div>
  </div>
  <div class="review-title">解説</div>
  <div class="review-list" id="reviewList"></div>
  <button class="retry-btn" onclick="startQuiz()">もう一度チャレンジ</button>
  <div class="submit-status" id="submitStatus"></div>
  <a href="index.html" class="home-link">← クイズ一覧に戻る</a>
</div>

</div>
<script>
// Apps Scriptデプロイ後、発行されたWebアプリのURLをここに設定（SETUP.md参照）
const SUBMIT_URL = "https://script.google.com/macros/s/AKfycbzpQloDrnluceZVUFyLruPKE8PVOENnG-u_yfrsGx90bqVSfDtxNdxViJ1JhfQA7Bv3Dw/exec";
const QUIZ_NAME = "131 イオンからなる物質（イオン結合・イオン結晶・組成式と名称）";
const PASS_THRESHOLD = 8; // 10問中この点数以上で合格

const ALL_Q = [
  {q:"イオンからなる物質における陽イオンと陰イオンの関係式として正しいものはどれか？",
   choices:["陽イオンの価数×個数＝陰イオンの価数×個数","陽イオンの個数＝陰イオンの個数","陽イオンの価数＝陰イオンの価数","陽イオンの質量＝陰イオンの質量"], a:0,
   exp:"イオンからなる物質は電気的に中性なので、陽イオンの（価数）×（個数）＝陰イオンの（価数）×（個数）という関係が成り立つ。組成式を作るときはまずこの関係から個数比を求める。"},

  {q:"組成式を書くときの順番として正しいものはどれか？",
   choices:["陽イオン、陰イオンの順に書く","陰イオン、陽イオンの順に書く","価数の大きいイオンから書く","アルファベット順に書く"], a:0,
   exp:"組成式は陽イオン、陰イオンの順に元素記号を書き、電荷の符号をとって個数の比をイオンの右下に書く。"},

  {q:"イオンからなる物質の名称を書くときの順番として正しいものはどれか？",
   choices:["陰イオン、陽イオンの順に「～化」「～イオン」などをとってつなげる","陽イオン、陰イオンの順に書く","価数の小さいイオンから書く","組成式と同じ順で書く"], a:0,
   exp:"名称は陰イオン、陽イオンの順に、「～物イオン」「～イオン」の部分をとってつなげて書く（組成式とは逆の順番になる点に注意）。"},

  {q:"組成式で、同じ多原子イオンが2つ以上あるときはどのように表すか？",
   choices:["（　）でくくって個数を右下に書く（例：Ca(OH)₂）","そのまま2つ並べて書く","係数を先頭につける","省略して1つだけ書く"], a:0,
   exp:"同じ多原子イオンが2つ以上あるときは（　）でくくり、その右下に個数を書く（例：Ca(OH)₂）。単原子イオンにはこの括弧は不要。"},

  {q:"組成式で、陽イオンと陰イオンの個数の比が1：1のとき、その「1」はどう書くか？",
   choices:["省略して書かない（例：NaCl）","必ず1と書く（例：Na₁Cl₁）","分数で表す","（　）に入れる"], a:0,
   exp:"組成式では個数の比が1のときは数字を省略して書かない（例：NaCl）。"},

  {q:"組成式CaCl₂からできる物質の名称として、「二塩化カルシウム」のように陰イオンの個数を表す数詞を名称に含めてよいか？",
   choices:["含めない（「二塩化」「二水酸化」とは書かない）","必ず含める","個数が2以上のときのみ含める","陽イオン名の前にのみ含める"], a:0,
   exp:"イオンからなる物質の名称には、「二塩化」「二水酸化」のように個数を表す数詞はつけない。"},

  {q:"鉄のように複数の価数の陽イオンになる金属を含む物質を命名するときは、どのように区別するか？",
   choices:["価数をローマ数字で元素名の後に（　）で示す（例：塩化鉄(II)）","元素名の前に価数の数字をそのまま書く","価数の情報は名称に含めない","陰イオン名の後に価数を示す"], a:0,
   exp:"鉄Fe²⁺・Fe³⁺のように複数の価数をとる金属イオンを含む物質は、価数をローマ数字で示して区別する（例：塩化鉄(II)FeCl₂、塩化鉄(III)FeCl₃）。"},

  {q:"カリウムイオンK⁺と塩化物イオンCl⁻からなる物質の組成式はどれか？",
   choices:["KCl","K₂Cl","KCl₂","K₂Cl₂"], a:0,
   exp:"K⁺とCl⁻はともに1価なので個数の比は1：1となり、組成式はKClとなる。"},

  {q:"ナトリウムイオンNa⁺と炭酸イオンCO₃²⁻からなる物質の組成式はどれか？",
   choices:["Na₂CO₃","NaCO₃","Na₂(CO₃)₂","Na(CO₃)₂"], a:0,
   exp:"1価のNa⁺と2価のCO₃²⁻の個数の比は2：1となるため、組成式はNa₂CO₃となる。"},

  {q:"カルシウムイオンCa²⁺と硝酸イオンNO₃⁻からなる物質の組成式はどれか？",
   choices:["Ca(NO₃)₂","CaNO₃","Ca₂NO₃","Ca(NO₃)₃"], a:0,
   exp:"2価のCa²⁺と1価のNO₃⁻の個数の比は1：2となり、多原子イオンNO₃⁻が2個あるので（　）をつけてCa(NO₃)₂となる。"},

  {q:"鉄(II)イオンFe²⁺と硫化物イオンS²⁻からなる物質の組成式はどれか？",
   choices:["FeS","Fe₂S","FeS₂","Fe₂S₂"], a:0,
   exp:"Fe²⁺とS²⁻はともに2価なので個数の比は1：1となり、組成式はFeSとなる。"},

  {q:"アンモニウムイオンNH₄⁺とリン酸イオンPO₄³⁻からなる物質の組成式はどれか？",
   choices:["(NH₄)₃PO₄","NH₄PO₄","(NH₄)₃(PO₄)₃","NH₁₂PO₄"], a:0,
   exp:"1価のNH₄⁺と3価のPO₄³⁻の個数の比は3：1となり、多原子イオンNH₄⁺が3個あるので（　）をつけて(NH₄)₃PO₄となる。"},

  {q:"鉄(III)イオンFe³⁺と硫酸イオンSO₄²⁻からなる物質の組成式はどれか？",
   choices:["Fe₂(SO₄)₃","Fe₃(SO₄)₂","FeSO₄","Fe₃SO₄"], a:0,
   exp:"3価のFe³⁺と2価のSO₄²⁻の個数の比は2：3となるため、組成式はFe₂(SO₄)₃となる。"},

  {q:"マグネシウムイオンMg²⁺と塩化物イオンCl⁻からなる物質の組成式はどれか？",
   choices:["MgCl₂","MgCl","Mg₂Cl","Mg₂Cl₂"], a:0,
   exp:"2価のMg²⁺と1価のCl⁻の個数の比は1：2となり、組成式はMgCl₂となる。"},

  {q:"亜鉛イオンZn²⁺と硫化物イオンS²⁻からなる物質の組成式はどれか？",
   choices:["ZnS","Zn₂S","ZnS₂","Zn₂S₂"], a:0,
   exp:"Zn²⁺とS²⁻はともに2価なので個数の比は1：1となり、組成式はZnSとなる。"},

  {q:"銀イオンAg⁺と硝酸イオンNO₃⁻からなる物質の組成式はどれか？",
   choices:["AgNO₃","Ag(NO₃)₂","Ag₂NO₃","AgNO₂"], a:0,
   exp:"Ag⁺とNO₃⁻はともに1価なので個数の比は1：1となり、組成式はAgNO₃となる。"},

  {q:"アルミニウムイオンAl³⁺と水酸化物イオンOH⁻からなる物質の組成式はどれか？",
   choices:["Al(OH)₃","AlOH₃","Al₃(OH)","Al₃OH"], a:0,
   exp:"3価のAl³⁺と1価のOH⁻の個数の比は1：3となり、多原子イオンOH⁻が3個あるので（　）をつけてAl(OH)₃となる。"},

  {q:"アルミニウムイオンAl³⁺と硫酸イオンSO₄²⁻からなる物質の組成式はどれか？",
   choices:["Al₂(SO₄)₃","Al₃(SO₄)₂","AlSO₄","Al(SO₄)₃"], a:0,
   exp:"3価のAl³⁺と2価のSO₄²⁻の個数の比は2：3となるため、組成式はAl₂(SO₄)₃となる。"},

  {q:"カリウムイオンK⁺と炭酸イオンCO₃²⁻からなる物質の組成式はどれか？",
   choices:["K₂CO₃","KCO₃","K₂(CO₃)₂","K(CO₃)₂"], a:0,
   exp:"1価のK⁺と2価のCO₃²⁻の個数の比は2：1となるため、組成式はK₂CO₃となる。"},

  {q:"カルシウムイオンCa²⁺とリン酸イオンPO₄³⁻からなる物質の組成式はどれか？",
   choices:["Ca₃(PO₄)₂","CaPO₄","Ca₂PO₄","Ca₃PO₄"], a:0,
   exp:"2価のCa²⁺と3価のPO₄³⁻の個数の比は3：2となるため、組成式はCa₃(PO₄)₂となる。"},

  {q:"鉄(III)イオンFe³⁺と酸化物イオンO²⁻からなる物質の組成式はどれか？",
   choices:["Fe₂O₃","FeO","Fe₃O₂","Fe₂O₂"], a:0,
   exp:"3価のFe³⁺と2価のO²⁻の個数の比は2：3となるため、組成式はFe₂O₃となる。"},

  {q:"ナトリウムイオンNa⁺と水酸化物イオンOH⁻からなる物質の名称はどれか？",
   choices:["水酸化ナトリウム","ナトリウム水酸化物","水酸化ナトリウム酸","酸化ナトリウム"], a:0,
   exp:"陰イオン、陽イオンの順に名称をつなげ、水酸化物イオンとナトリウムイオンから水酸化ナトリウムとなる。"},

  {q:"カルシウムイオンCa²⁺と炭酸イオンCO₃²⁻からなる物質の名称はどれか？",
   choices:["炭酸カルシウム","カルシウム炭酸塩","二炭酸カルシウム","炭酸カルシウム酸"], a:0,
   exp:"炭酸イオンとカルシウムイオンから、炭酸カルシウムという名称になる。個数を表す数詞は名称につけない。"},

  {q:"アルミニウムイオンAl³⁺と塩化物イオンCl⁻からなる物質（組成式AlCl₃）の名称はどれか？",
   choices:["塩化アルミニウム","三塩化アルミニウム","アルミニウム塩化物","塩化アルミニウム(III)"], a:0,
   exp:"塩化物イオンとアルミニウムイオンから塩化アルミニウムとなる。個数を表す数詞（三など）は名称には含めない。"},

  {q:"鉄(II)イオンFe²⁺と塩化物イオンCl⁻からなる物質（組成式FeCl₂）の名称はどれか？",
   choices:["塩化鉄(II)","塩化鉄(III)","二塩化鉄","鉄塩化物"], a:0,
   exp:"Fe²⁺を含む物質は価数をローマ数字で示し、塩化鉄(II)とよぶ。"},

  {q:"鉄(III)イオンFe³⁺と酸化物イオンO²⁻からなる物質（組成式Fe₂O₃）の名称はどれか？",
   choices:["酸化鉄(III)","酸化鉄(II)","三酸化鉄","酸化鉄二"], a:0,
   exp:"Fe³⁺を含む物質は価数をローマ数字で示し、酸化鉄(III)とよぶ。"},

  {q:"アンモニウムイオンNH₄⁺と塩化物イオンCl⁻からなる物質の名称はどれか？",
   choices:["塩化アンモニウム","アンモニウム塩化物","塩化アンモニア","アンモニア塩化物"], a:0,
   exp:"塩化物イオンとアンモニウムイオンから塩化アンモニウムとなる。"},

  {q:"亜鉛イオンZn²⁺と硫化物イオンS²⁻からなる物質（組成式ZnS）の名称はどれか？",
   choices:["硫化亜鉛","亜鉛硫化物","二硫化亜鉛","硫酸亜鉛"], a:0,
   exp:"硫化物イオンS²⁻と亜鉛イオンから硫化亜鉛となる。硫酸イオンSO₄²⁻からなる「硫酸亜鉛」と混同しないよう注意。"},

  {q:"「硫化亜鉛」の組成式として正しいものはどれか？",
   choices:["ZnS","ZnSO₄","ZnS₂","Zn₂S"], a:0,
   exp:"硫化亜鉛は亜鉛イオンZn²⁺と硫化物イオンS²⁻（ともに2価）からなり、組成式はZnSとなる。"},

  {q:"「硝酸銀」の組成式として正しいものはどれか？",
   choices:["AgNO₃","Ag(NO₃)₂","Ag₂NO₃","AgNO₂"], a:0,
   exp:"硝酸銀は銀イオンAg⁺と硝酸イオンNO₃⁻（ともに1価）からなり、組成式はAgNO₃となる。"},

  {q:"「水酸化アルミニウム」の組成式として正しいものはどれか？",
   choices:["Al(OH)₃","AlOH₃","Al₃(OH)","AlOH"], a:0,
   exp:"水酸化アルミニウムはAl³⁺と3個のOH⁻からなるため、組成式はAl(OH)₃となる。"},

  {q:"「酸化鉄(III)」の組成式として正しいものはどれか？",
   choices:["Fe₂O₃","FeO","Fe₃O₂","FeO₃"], a:0,
   exp:"酸化鉄(III)はFe³⁺とO²⁻からなり、個数の比2：3より組成式はFe₂O₃となる。"},

  {q:"「硫酸アルミニウム」の組成式として正しいものはどれか？",
   choices:["Al₂(SO₄)₃","Al₃(SO₄)₂","AlSO₄","Al(SO₄)₃"], a:0,
   exp:"硫酸アルミニウムはAl³⁺（3価）とSO₄²⁻（2価）からなり、個数の比2：3より組成式はAl₂(SO₄)₃となる。"},

  {q:"「塩化マグネシウム」の組成式として正しいものはどれか？",
   choices:["MgCl₂","MgCl","Mg₂Cl","Mg₂Cl₂"], a:0,
   exp:"塩化マグネシウムはMg²⁺（2価）とCl⁻（1価）からなり、個数の比1：2より組成式はMgCl₂となる。"},

  {q:"「リン酸ナトリウム」の組成式として正しいものはどれか？",
   choices:["Na₃PO₄","NaPO₄","Na₃(PO₄)₃","Na(PO₄)₃"], a:0,
   exp:"リン酸ナトリウムはNa⁺（1価）とPO₄³⁻（3価）からなり、個数の比3：1より組成式はNa₃PO₄となる。"},

  {q:"「炭酸カリウム」の組成式として正しいものはどれか？",
   choices:["K₂CO₃","KCO₃","K₂(CO₃)₂","K(CO₃)₂"], a:0,
   exp:"炭酸カリウムはK⁺（1価）とCO₃²⁻（2価）からなり、個数の比2：1より組成式はK₂CO₃となる。"},

  {q:"「リン酸アンモニウム」の組成式として正しいものはどれか？",
   choices:["(NH₄)₃PO₄","NH₄PO₄","(NH₄)₃(PO₄)₃","NH₄(PO₄)₃"], a:0,
   exp:"リン酸アンモニウムはNH₄⁺（1価）とPO₄³⁻（3価）からなり、個数の比3：1で、多原子イオンが複数あるため（　）をつけて(NH₄)₃PO₄となる。"},

  {q:"「水酸化マグネシウム」の組成式として正しいものはどれか？",
   choices:["Mg(OH)₂","MgOH₂","Mg₂(OH)","MgOH"], a:0,
   exp:"水酸化マグネシウムはMg²⁺（2価）とOH⁻（1価）からなり、個数の比1：2で、多原子イオンが複数あるため（　）をつけてMg(OH)₂となる。"},

  {q:"陽イオンと陰イオンが静電気力（クーロン力）で引きあう結びつきを何というか？",
   choices:["イオン結合","共有結合","金属結合","水素結合"], a:0,
   exp:"陽イオンと陰イオンが静電気力（クーロン力）で引きあって結びつくことをイオン結合という。"},

  {q:"静電気力の説明として正しいものはどれか？",
   choices:["電荷の符号が異なれば引きあい、符号が同じなら反発しあう","電荷の符号に関わらず常に引きあう","電荷の符号が同じなら引きあい、異なれば反発しあう","電荷をもたない粒子の間にのみはたらく"], a:0,
   exp:"静電気力は電荷をもつ粒子の間にはたらく力で、電荷の符号が異なる（正と負）なら引きあう力、符号が同じ（正と正または負と負）なら反発しあう力となる。"},

  {q:"固体の塩化ナトリウムの中で、Na⁺とCl⁻を結びつけている力は何か？",
   choices:["静電気力（クーロン力）","共有結合の力","分子間力","金属結合の力"], a:0,
   exp:"固体の塩化ナトリウムの中では、Na⁺とCl⁻が静電気力（クーロン力）で引きあって結びついている（イオン結合）。"},

  {q:"粒子が規則正しく配列している固体を何というか？",
   choices:["結晶","分子","組成式","単体"], a:0,
   exp:"粒子が規則的に配列している固体を結晶という。"},

  {q:"イオン結合によってできる結晶を何というか？",
   choices:["イオン結晶","分子結晶","共有結合の結晶","金属結晶"], a:0,
   exp:"イオン結合によってできる結晶をイオン結晶という。"},

  {q:"イオン結晶の一般的な性質として正しいものはどれか？",
   choices:["融点が高く、硬い","融点が低く、やわらかい","電気を通しやすく、もろい","融点は高いが非常にやわらかい"], a:0,
   exp:"イオン結合は強い結合なので、イオン結晶は一般に融点が高く、硬い。"},

  {q:"イオン結晶に外部から強い力を加えると簡単に割れてしまうのはなぜか？",
   choices:["陽イオンどうし・陰イオンどうしが反発しあう面ができるから","イオン結合がもともと非常に弱いから","イオンが結晶中を自由に動きまわっているから","結晶の融点が低いから"], a:0,
   exp:"外部から強い力が加わると陽イオンと陰イオンの位置関係がずれ、陽イオンどうし・陰イオンどうしが反発しあう面ができて簡単に割れてしまう。"},

  {q:"結晶が特定の面にそって割れることを何というか？",
   choices:["へき開","電離","風解","潮解"], a:0,
   exp:"結晶が特定の面にそって割れることをへき開という。イオン結晶以外の結晶でも、結合の弱い面があると起こることがある。"},

  {q:"イオンからなる物質は、固体（結晶）の状態で電気を通すか？",
   choices:["通さない（イオンが動けないため）","通す（イオンが自由に動けるため）","一部の物質のみ通す","金属光沢があるため通す"], a:0,
   exp:"イオンからなる物質は結晶のままではイオンの位置が固定されて動けないため、電気を通さない。"},

  {q:"塩化ナトリウムを水に溶かしたり融解させたりすると電気を通すようになるのはなぜか？",
   choices:["陽イオンと陰イオンが分かれて自由に動けるようになるから","原子が電子を放出して金属になるから","結晶構造が保たれたままになるから","分子に変化するから"], a:0,
   exp:"水に溶かしたり融解させたりすると、陽イオンと陰イオンが分かれて自由に動けるようになるので、電気を通す。"},

  {q:"水溶液中などで物質がイオンに分かれることを何というか？",
   choices:["電離","融解","潮解","風解"], a:0,
   exp:"水溶液中などで物質がイオンに分かれることを電離という。"},

  {q:"塩化ナトリウムのように、水に溶けたときに電離する物質を何というか？",
   choices:["電解質","非電解質","結晶質","分子性物質"], a:0,
   exp:"水に溶けたときに電離する物質を電解質という。"},

  {q:"スクロース（ショ糖）やエタノールのように、水に溶けても電離しない物質を何というか？",
   choices:["非電解質","電解質","イオン結晶","電離質"], a:0,
   exp:"水に溶けても電離しない物質を非電解質という。非電解質の水溶液は電気を通さない。"},

  {q:"次のうち、イオンからなる物質だが水に溶けにくいものはどれか？",
   choices:["炭酸カルシウムCaCO₃","塩化ナトリウムNaCl","水酸化ナトリウムNaOH","塩化カルシウムCaCl₂"], a:0,
   exp:"イオンからなる物質には水に溶けやすいものが多いが、炭酸カルシウムCaCO₃、塩化銀AgCl、硫酸バリウムBaSO₄などは水に溶けにくい。"}
];

let session=[], idx=0, score=0, results=[], studentId="";

document.getElementById("totalBadge").textContent="全"+ALL_Q.length+"問収録";

function shuffle(arr){
  let a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function shuffleChoices(q){
  const order=shuffle([0,1,2,3]);
  return {...q, choices:order.map(i=>q.choices[i]), a:order.indexOf(q.a)};
}

function showOnly(id){
  ["start","quiz","result"].forEach(s=>document.getElementById(s).classList.toggle("hidden",s!==id));
}

function toHalfWidthDigits(s){
  return s.replace(/[０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0));
}

function startQuiz(){
  const idInput=document.getElementById("studentId");
  const normalized=toHalfWidthDigits(idInput.value.trim());
  if(!/^(20(0[0-9]|10)|1[1-6](0[1-9]|[1-3][0-9]|40))$/.test(normalized)){
    alert("学籍番号が正しくありません。\n1桁目は学年「1」、2桁目は組「1〜6」、3・4桁目は出席番号「01〜40」です（例：1年1組4番→1104）。");
    idInput.focus();
    return;
  }
  idInput.value=normalized;
  studentId=normalized;
  session=shuffle(ALL_Q).slice(0,10).map(shuffleChoices);
  idx=0; score=0; results=[];
  showOnly("quiz");
  renderQ();
}

function renderQ(){
  const q=session[idx];
  document.getElementById("pbar").style.width=((idx)/10*100)+"%";
  document.getElementById("qnum").textContent=(idx+1)+"/10";
  document.getElementById("qtext").textContent=q.q;
  document.getElementById("exp").style.display="none";
  document.getElementById("nextBtn").style.display="none";

  const ci=document.getElementById("choices");
  ci.innerHTML="";
  q.choices.forEach((c,i)=>{
    const btn=document.createElement("button");
    btn.className="choice-btn";
    btn.textContent=c;
    btn.onclick=()=>select(i);
    ci.appendChild(btn);
  });
}

function select(chosen){
  const q=session[idx];
  const btns=document.querySelectorAll(".choice-btn");
  btns.forEach(b=>b.disabled=true);
  btns[chosen].classList.add(chosen===q.a?"correct":"wrong");
  if(chosen!==q.a) btns[q.a].classList.add("correct");

  if(chosen===q.a) score++;
  results.push({q:q.q,correct:chosen===q.a,yourAns:q.choices[chosen],rightAns:q.choices[q.a],exp:q.exp});

  const expBox=document.getElementById("exp");
  expBox.textContent=q.exp;
  expBox.style.display="block";
  document.getElementById("nextBtn").style.display="block";
  document.getElementById("nextBtn").textContent=idx===9?"結果を見る":"次の問題へ →";
}

function next(){
  idx++;
  if(idx>=10){showResult();return;}
  renderQ();
}

function showResult(){
  showOnly("result");
  document.getElementById("scoreBig").textContent=score;

  const pct=score/10*100;
  const color=score>=8?"#48bb78":score>=6?"#4299e1":score>=4?"#ed8936":"#fc8181";
  const arc=document.getElementById("donut-arc");
  arc.setAttribute("stroke",color);
  arc.setAttribute("stroke-dasharray",pct+" "+(100-pct));

  const passed=score>=PASS_THRESHOLD;
  const passBadge=document.getElementById("passBadge");
  passBadge.textContent=passed?"合格":"不合格";
  passBadge.className="pass-badge "+(passed?"pass":"fail");

  const list=document.getElementById("reviewList");
  list.innerHTML="";
  results.forEach((r,i)=>{
    const div=document.createElement("div");
    div.className="review-item"+(r.correct?"":" miss");
    div.innerHTML=`<div class="rq">${i+1}. ${r.q}</div>
      <div class="ra">${r.correct?"✓ 正解："+r.rightAns:"✗ あなたの答え："+r.yourAns+" → 正解："+r.rightAns}</div>
      <div class="ra" style="margin-top:4px;color:#7b341e">${r.exp}</div>`;
    list.appendChild(div);
  });

  submitResult();
}

function submitResult(){
  const statusEl=document.getElementById("submitStatus");
  if(!SUBMIT_URL){
    statusEl.textContent="※送信先が未設定のため、この結果は記録されていません";
    return;
  }
  const payload={
    studentId:studentId,
    quizName:QUIZ_NAME,
    score:score,
    total:10,
    passed:score>=PASS_THRESHOLD?"合格":"不合格",
    timestamp:new Date().toISOString(),
    missed:results.filter(r=>!r.correct).map(r=>r.q)
  };
  try{
    fetch(SUBMIT_URL,{
      method:"POST",
      mode:"no-cors",
      headers:{"Content-Type":"text/plain;charset=utf-8"},
      body:JSON.stringify(payload)
    });
    statusEl.textContent="学籍番号: "+studentId+"｜記録しました";
  }catch(err){
    statusEl.textContent="※通信エラーのため記録できませんでした";
  }
}
</script>
