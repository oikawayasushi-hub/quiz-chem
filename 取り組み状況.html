<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>化学基礎クイズ｜取り組み状況の確認</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Helvetica Neue',Arial,'Hiragino Kaku Gothic ProN',sans-serif;background:#f0f4f8;color:#2d3748;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:16px}
.wrap{width:100%;max-width:640px}
.card{background:#fff;border-radius:16px;padding:32px;box-shadow:0 4px 24px rgba(0,0,0,.08)}
h1{font-size:1.5rem;font-weight:700;color:#2b6cb0;margin-bottom:8px}
.sub{color:#718096;font-size:.95rem;margin-bottom:24px}
.id-label{display:block;font-size:.85rem;font-weight:600;color:#4a5568;margin-bottom:6px}
.id-row{display:flex;gap:10px;margin-bottom:8px}
.id-input{flex:1;padding:12px 14px;border:2px solid #e2e8f0;border-radius:10px;font-size:.95rem}
.id-input:focus{outline:none;border-color:#4299e1}
.check-btn{padding:12px 22px;background:linear-gradient(135deg,#4299e1,#3182ce);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;transition:opacity .2s;white-space:nowrap}
.check-btn:hover{opacity:.9}
.check-btn:disabled{opacity:.5;cursor:default}
.status-msg{font-size:.85rem;color:#718096;min-height:1.3em;margin-bottom:16px}
.status-msg.err{color:#c53030}
.progress-card{display:none;margin-top:8px}
.summary{display:flex;align-items:center;gap:16px;margin-bottom:20px}
.summary .count{font-size:1.6rem;font-weight:800;color:#2b6cb0;white-space:nowrap}
.summary .count small{font-size:.9rem;font-weight:600;color:#718096}
.summary-bar{flex:1;height:12px;background:#e2e8f0;border-radius:6px;overflow:hidden}
.summary-fill{height:100%;background:linear-gradient(90deg,#48bb78,#38a169);border-radius:6px;transition:width .4s}
.chapter{font-weight:700;color:#4a5568;font-size:.95rem;margin:18px 0 8px;padding-bottom:4px;border-bottom:2px solid #e2e8f0}
.quiz-row{display:flex;align-items:center;justify-content:space-between;padding:9px 4px;border-bottom:1px solid #f1f5f9;gap:10px}
.quiz-row .name{font-size:.92rem}
.quiz-row .name a{color:#2d3748;text-decoration:none}
.quiz-row .name a:hover{color:#2b6cb0;text-decoration:underline}
.badge{padding:3px 12px;border-radius:20px;font-size:.8rem;font-weight:700;white-space:nowrap}
.badge.pass{background:#f0fff4;color:#276749}
.badge.fail{background:#fff5f5;color:#c53030}
.badge.none{background:#edf2f7;color:#a0aec0}
.tries{font-size:.8rem;color:#718096;white-space:nowrap;margin-right:6px}
.home-link{display:block;text-align:center;margin-top:20px;color:#2b6cb0;font-size:.85rem;text-decoration:none}
.home-link:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="wrap">
<div class="card">
  <h1>取り組み状況の確認</h1>
  <p class="sub">学籍番号を入力すると、クイズごとの合格状況を確認できます。</p>

  <label class="id-label" for="studentId">学籍番号（学年・組・出席番号を半角4桁で／例：1年1組4番→1104）</label>
  <div class="id-row">
    <input class="id-input" id="studentId" placeholder="1104" inputmode="numeric" maxlength="4">
    <button class="check-btn" id="checkBtn" onclick="checkStatus()">確認</button>
  </div>
  <div class="status-msg" id="statusMsg"></div>

  <div class="progress-card" id="progressCard">
    <div class="summary">
      <div class="count"><span id="passCount">0</span><small> / <span id="quizTotal">0</span> 合格</small></div>
      <div class="summary-bar"><div class="summary-fill" id="summaryFill" style="width:0%"></div></div>
    </div>
    <div id="quizList"></div>
  </div>

  <a href="index.html" class="home-link">← クイズ一覧に戻る</a>
</div>
</div>
<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzpQloDrnluceZVUFyLruPKE8PVOENnG-u_yfrsGx90bqVSfDtxNdxViJ1JhfQA7Bv3Dw/exec";

// code: クイズ名の先頭3桁 / name: 番号を除いたQUIZ_NAME(過去の記録との照合にも使用)
// label: 表示名 / file: クイズページ / ch: 章
const QUIZZES = [
  {code:"111", name:"純物質・混合物の分類、物質の分離・精製", label:"物質の分離", file:"物質の分離.html", ch:"第1章　物質の構成"},
  {code:"112", name:"物質の成分・同素体、成分元素の検出", label:"物質とその成分", file:"物質とその成分.html", ch:"第1章　物質の構成"},
  {code:"113", name:"元素記号と元素名（原子番号1〜20）", label:"元素記号と元素名", file:"周期表.html", ch:"第1章　物質の構成"},
  {code:"114", name:"物質の三態と熱運動", label:"熱運動・状態変化A", file:"熱運動・状態変化.html", ch:"第1章　物質の構成"},
  {code:"115", name:"物質の三態と熱運動（思考力問題）", label:"熱運動・状態変化B", file:"熱運動・状態変化B.html", ch:"第1章　物質の構成"},
  {code:"121", name:"原子の構造", label:"原子構造", file:"原子構造.html", ch:"第2章　物質の構成粒子"},
  {code:"122", name:"電子配置クイズ（電子殻・電子配置・価電子・貴ガス）", label:"電子配置", file:"電子配置クイズ.html", ch:"第2章　物質の構成粒子"},
  {code:"123", name:"イオンクイズ（陽イオン・陰イオン・多原子イオン）", label:"イオン", file:"イオンクイズ.html", ch:"第2章　物質の構成粒子"},
  {code:"124", name:"周期律と周期表", label:"周期表と周期律", file:"周期表・周期律.html", ch:"第2章　物質の構成粒子"},
  {code:"131", name:"イオンからなる物質（イオン結合・イオン結晶・組成式と名称）", label:"イオン結合とイオン結晶", file:"イオン結合、イオン結晶.html", ch:"第3章　粒子の結合"},
  {code:"132", name:"共有結合と分子（電子式・構造式・配位結合）", label:"共有結合と分子", file:"共有結合と分子.html", ch:"第3章　粒子の結合"},
  {code:"133", name:"分子からなる物質（電気陰性度・極性・分子間力・分子結晶）", label:"分子からなる物質と極性", file:"分子からなる物質と極性.html", ch:"第3章　粒子の結合"},
  {code:"134", name:"共有結合の結晶・金属結合と金属結晶", label:"共有結合の結晶・金属結合と金属結晶", file:"共有結合の結晶・金属結合と金属結晶.html", ch:"第3章　粒子の結合"},
  {code:"135", name:"結晶格子と単位格子（金属結晶・イオン結晶）", label:"結晶格子と単位格子（発展）", file:"結晶格子と単位格子.html", ch:"第3章　粒子の結合"}
];

function toHalfWidthDigits(s){
  return s.replace(/[０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0));
}

async function checkStatus(){
  const idInput=document.getElementById("studentId");
  const msg=document.getElementById("statusMsg");
  const btn=document.getElementById("checkBtn");
  const normalized=toHalfWidthDigits(idInput.value.trim());
  if(!/^(2000|1[1-6](0[1-9]|[1-3][0-9]|40))$/.test(normalized)){
    msg.textContent="学籍番号が正しくありません（例：1年1組4番→1104）。";
    msg.className="status-msg err";
    idInput.focus();
    return;
  }
  idInput.value=normalized;
  msg.textContent="読み込み中…";
  msg.className="status-msg";
  btn.disabled=true;
  try{
    const res=await fetch(API_URL+"?studentId="+encodeURIComponent(normalized));
    const data=await res.json();
    if(!data.ok) throw new Error(data.error||"error");
    render(data.quizzes||{});
    msg.textContent="学籍番号 "+normalized+" の取り組み状況";
  }catch(err){
    msg.textContent="データを取得できませんでした。通信環境を確認して、もう一度お試しください。";
    msg.className="status-msg err";
  }finally{
    btn.disabled=false;
  }
}

function render(recorded){
  // 記録上のクイズ名から先頭の3桁番号を除いた名前 → 合否・挑戦回数を集計
  const statByName={};
  Object.keys(recorded).forEach(key=>{
    const stripped=key.replace(/^\d{3}\s*/,"");
    if(!(stripped in statByName)) statByName[stripped]={passed:false,attempts:0};
    statByName[stripped].attempts+=recorded[key].attempts||0;
    if(recorded[key].passed) statByName[stripped].passed=true;
  });

  const list=document.getElementById("quizList");
  list.innerHTML="";
  let passCount=0, currentCh="";
  QUIZZES.forEach(q=>{
    if(q.ch!==currentCh){
      currentCh=q.ch;
      const ch=document.createElement("div");
      ch.className="chapter";
      ch.textContent=currentCh;
      list.appendChild(ch);
    }
    const stat=statByName[q.name];
    let cls,text;
    if(!stat){
      cls="none"; text="未挑戦";
    }else if(stat.passed){
      cls="pass"; text="✅ 合格"; passCount++;
    }else{
      cls="fail"; text="未合格";
    }
    const row=document.createElement("div");
    row.className="quiz-row";
    const name=document.createElement("div");
    name.className="name";
    const link=document.createElement("a");
    link.href=q.file;
    link.textContent=q.code+" "+q.label;
    name.appendChild(link);
    const right=document.createElement("div");
    if(stat){
      const tries=document.createElement("span");
      tries.className="tries";
      tries.textContent=stat.attempts+"回挑戦";
      right.appendChild(tries);
    }
    const badge=document.createElement("span");
    badge.className="badge "+cls;
    badge.textContent=text;
    right.appendChild(badge);
    row.appendChild(name);
    row.appendChild(right);
    list.appendChild(row);
  });

  document.getElementById("passCount").textContent=passCount;
  document.getElementById("quizTotal").textContent=QUIZZES.length;
  document.getElementById("summaryFill").style.width=(passCount/QUIZZES.length*100)+"%";
  document.getElementById("progressCard").style.display="block";
}

document.getElementById("studentId").addEventListener("keydown",e=>{
  if(e.key==="Enter") checkStatus();
});
</script>
</body>
</html>
