<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>化学基礎クイズ｜結晶格子と単位格子（発展）</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Helvetica Neue',Arial,'Hiragino Kaku Gothic ProN',sans-serif;background:#f0f4f8;color:#2d3748;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.wrap{width:100%;max-width:640px}
.card{background:#fff;border-radius:16px;padding:32px;box-shadow:0 4px 24px rgba(0,0,0,.08)}
#start h1{font-size:1.5rem;font-weight:700;color:#2b6cb0;margin-bottom:8px}
#start .sub{color:#718096;font-size:.95rem;margin-bottom:24px}
.total-badge{display:inline-block;padding:4px 14px;border-radius:20px;font-size:.8rem;font-weight:600;background:#ebf8ff;color:#2b6cb0;margin-bottom:24px}
.id-label{display:block;font-size:.85rem;font-weight:600;color:#4a5568;margin-bottom:6px}
.id-input{width:100%;padding:12px 14px;border:2px solid #e2e8f0;border-radius:10px;font-size:.95rem;margin-bottom:20px}
.id-input:focus{outline:none;border-color:#4299e1}
.start-btn{width:100%;padding:14px;background:linear-gradient(135deg,#4299e1,#3182ce);color:#fff;border:none;border-radius:10px;font-size:1.05rem;font-weight:700;cursor:pointer;transition:opacity .2s}
.start-btn:hover{opacity:.9}
.submit-status{margin-top:14px;text-align:center;font-size:.8rem;color:#a0aec0}
#quiz .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.progress-wrap{flex:1;height:8px;background:#e2e8f0;border-radius:4px;margin:0 12px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,#4299e1,#63b3ed);border-radius:4px;transition:width .3s}
.q-num{font-size:.85rem;color:#718096;white-space:nowrap}
.q-text{font-size:1.1rem;font-weight:600;line-height:1.6;margin-bottom:20px}
.choices{display:flex;flex-direction:column;gap:10px}
.choice-btn{padding:13px 16px;border:2px solid #e2e8f0;border-radius:10px;background:#fff;font-size:.95rem;cursor:pointer;text-align:left;transition:all .15s}
.choice-btn:hover:not(:disabled){border-color:#4299e1;background:#ebf8ff}
.choice-btn.correct{border-color:#48bb78;background:#f0fff4;color:#276749;font-weight:700}
.choice-btn.wrong{border-color:#fc8181;background:#fff5f5;color:#c53030}
.choice-btn:disabled{cursor:default}
.exp-box{margin-top:16px;padding:12px 16px;background:#fffbeb;border-left:4px solid #f6ad55;border-radius:0 8px 8px 0;font-size:.9rem;color:#7b341e;line-height:1.6;display:none}
.next-btn{margin-top:18px;width:100%;padding:13px;background:#4299e1;color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;display:none;transition:opacity .2s}
.next-btn:hover{opacity:.9}
#result .r-title{font-size:1.3rem;font-weight:700;text-align:center;margin-bottom:20px}
.donut-wrap{display:flex;justify-content:center;align-items:center;gap:24px;margin-bottom:24px}
.donut-svg{width:120px;height:120px}
.score-big{font-size:2.5rem;font-weight:800;color:#2b6cb0;line-height:1}
.score-sub{font-size:.9rem;color:#718096}
.pass-badge{display:inline-block;margin-top:8px;padding:3px 12px;border-radius:20px;font-size:.85rem;font-weight:700}
.pass-badge.pass{background:#f0fff4;color:#276749}
.pass-badge.fail{background:#fff5f5;color:#c53030}
.review-title{font-weight:700;margin-bottom:12px;color:#4a5568}
.review-list{display:flex;flex-direction:column;gap:8px;max-height:320px;overflow-y:auto}
.review-item{padding:12px;border:1px solid #e2e8f0;border-radius:8px}
.review-item .rq{font-size:.9rem;font-weight:600;margin-bottom:4px}
.review-item .ra{font-size:.85rem;color:#718096}
.review-item.miss .rq{color:#c53030}
.retry-btn{margin-top:20px;width:100%;padding:13px;background:linear-gradient(135deg,#4299e1,#3182ce);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;transition:opacity .2s}
.retry-btn:hover{opacity:.9}
.home-link{display:block;text-align:center;margin-top:14px;color:#2b6cb0;font-size:.85rem;text-decoration:none}
.home-link:hover{text-decoration:underline}
.hidden{display:none}
</style>
</head>
<body>
<div class="wrap">

<div id="start" class="card">
  <h1>化学基礎クイズ</h1>
  <p class="sub">結晶格子と単位格子（発展）｜金属結晶・イオン結晶の結晶格子｜毎回ランダム10問</p>
  <div class="total-badge" id="totalBadge"></div>
  <label class="id-label" for="studentId">学籍番号（学年・組・出席番号を半角4桁で／例：1年1組4番→1104）</label>
  <input class="id-input" id="studentId" placeholder="1104" inputmode="numeric" maxlength="4">
  <button class="start-btn" onclick="startQuiz()">スタート</button>
</div>

<div id="quiz" class="card hidden">
  <div class="header">
    <div class="progress-wrap"><div class="progress-bar" id="pbar"></div></div>
    <div class="q-num" id="qnum"></div>
  </div>
  <div id="qtext" class="q-text"></div>
  <div id="choices" class="choices"></div>
  <div id="exp" class="exp-box"></div>
  <button id="nextBtn" class="next-btn" onclick="next()">次の問題へ →</button>
</div>

<div id="result" class="card hidden">
  <div class="r-title">結果発表</div>
  <div class="donut-wrap">
    <svg class="donut-svg" viewBox="0 0 36 36">
      <circle cx="18" cy="18" r="15.9" fill="none" stroke="#e2e8f0" stroke-width="3.8"/>
      <circle id="donut-arc" cx="18" cy="18" r="15.9" fill="none" stroke="#4299e1" stroke-width="3.8"
        stroke-dasharray="0 100" stroke-linecap="round" transform="rotate(-90 18 18)"/>
    </svg>
    <div>
      <div class="score-big" id="scoreBig"></div>
      <div class="score-sub">/ 10問正解</div>
      <div class="pass-badge" id="passBadge"></div>
    </div>
  </div>
  <div class="review-title">解説</div>
  <div class="review-list" id="reviewList"></div>
  <button class="retry-btn" onclick="startQuiz()">もう一度チャレンジ</button>
  <div class="submit-status" id="submitStatus"></div>
  <a href="index.html" class="home-link">← クイズ一覧に戻る</a>
</div>

</div>
<script>
const SUBMIT_URL = "https://script.google.com/macros/s/AKfycbzpQloDrnluceZVUFyLruPKE8PVOENnG-u_yfrsGx90bqVSfDtxNdxViJ1JhfQA7Bv3Dw/exec";
const QUIZ_NAME = "135 結晶格子と単位格子（金属結晶・イオン結晶）";
const PASS_THRESHOLD = 8; // 10問中この点数以上で合格

const ALL_Q = [
  {q:"結晶中で粒子が規則正しく配列している構造を何というか？",
   choices:["結晶格子","単位格子","配位数","充填率"], a:0,
   exp:"結晶中では粒子が規則正しく配列しており、この配列構造を結晶格子という。"},

  {q:"結晶格子の最小のくり返し構造を何というか？",
   choices:["単位格子","結晶格子","配位数","組成式"], a:0,
   exp:"結晶格子の最小のくり返し構造を単位格子という。"},

  {q:"1つの粒子に接している他の粒子の数を何というか？",
   choices:["配位数","充填率","原子半径","結晶格子"], a:0,
   exp:"1つの粒子に接している他の粒子の数を配位数という。"},

  {q:"結晶の体積のうち原子が占める割合を何というか？",
   choices:["充填率","配位数","密度","組成式"], a:0,
   exp:"結晶の体積のうち原子が占める割合を充填率という。充填率は単位格子で原子が占める割合に等しい。"},

  {q:"多くの金属結晶の結晶格子は、体心立方格子・面心立方格子ともう1つ何があるか？",
   choices:["六方最密構造","ダイヤモンド型構造","塩化ナトリウム型構造","単純立方格子"], a:0,
   exp:"多くの金属結晶の結晶格子は、体心立方格子、面心立方格子、六方最密構造のいずれかである。"},

  {q:"体心立方格子の単位格子中に含まれる原子は何個か？（頂点1/8個×8＋中心1個）",
   choices:["2個","4個","1個","8個"], a:0,
   exp:"体心立方格子は頂点に1/8個の原子が8個、中心に1個の原子があるので、1/8×8+1×1=2個となる。"},

  {q:"面心立方格子の単位格子中に含まれる原子は何個か？（頂点1/8個×8＋面1/2個×6）",
   choices:["4個","2個","6個","8個"], a:0,
   exp:"面心立方格子は頂点に1/8個の原子が8個、面に1/2個の原子が6個あるので、1/8×8+1/2×6=4個となる。"},

  {q:"六方最密構造の単位格子（図に示した六角柱の1/3にあたる部分）中に含まれる原子は何個か？",
   choices:["2個","3個","4個","6個"], a:0,
   exp:"六方最密構造では(1/6×12+1/2×2+1×3)÷3=2個となる。"},

  {q:"六方最密構造の原子の数を求める際、頂点・上下面・中間部の合計を最後に3で割るのはなぜか？",
   choices:["図に示した六角柱全体が単位格子3個分に相当するため","原子には3種類あるため","六角形の辺の数が3の倍数だから","配位数が12なので12÷4=3で割るため"], a:0,
   exp:"六方最密構造の図に示された六角柱全体は単位格子3個分の大きさに相当するので、合計を3で割ることで単位格子1個当たりの原子数が求められる。"},

  {q:"体心立方格子の配位数はいくつか？",
   choices:["8","12","6","4"], a:0,
   exp:"体心立方格子の配位数は8である。"},

  {q:"面心立方格子の配位数はいくつか？",
   choices:["12","8","6","4"], a:0,
   exp:"面心立方格子の配位数は12である。"},

  {q:"六方最密構造の配位数はいくつか？",
   choices:["12","8","6","4"], a:0,
   exp:"六方最密構造の配位数は12である。面心立方格子と同じ配位数をもつ。"},

  {q:"体心立方格子の充填率はおよそ何%か？",
   choices:["68%","74%","52%","90%"], a:0,
   exp:"体心立方格子の充填率はおよそ68%である。"},

  {q:"面心立方格子の充填率はおよそ何%か？",
   choices:["74%","68%","52%","100%"], a:0,
   exp:"面心立方格子の充填率はおよそ74%であり、最密の充填のしかたである。"},

  {q:"面心立方格子と六方最密構造の充填率について正しい関係はどれか？",
   choices:["どちらも74%で等しく、ともに最密構造とよばれる","面心立方格子のほうが明らかに大きい","六方最密構造のほうが明らかに大きい","全く異なる充填率になる"], a:0,
   exp:"面心立方格子と六方最密構造はどちらも充填率が74%で等しく、最密の構造である。"},

  {q:"体心立方格子の結晶構造をとる金属の例として教科書に挙げられているものはどれか？",
   choices:["Na、Fe","Al、Cu、Ag","Mg、Zn","Au、Pt"], a:0,
   exp:"体心立方格子をとる金属の例として、Na（ナトリウム）やFe（鉄）が挙げられている。"},

  {q:"面心立方格子の結晶構造をとる金属の例として教科書に挙げられているものはどれか？",
   choices:["Al、Cu、Ag","Na、Fe","Mg、Zn","W、Cr"], a:0,
   exp:"面心立方格子をとる金属の例として、Al（アルミニウム）、Cu（銅）、Ag（銀）が挙げられている。"},

  {q:"六方最密構造をとる金属の例として教科書に挙げられているものはどれか？",
   choices:["Mg、Zn","Al、Cu、Ag","Na、Fe","Au、Ag"], a:0,
   exp:"六方最密構造をとる金属の例として、Mg（マグネシウム）、Zn（亜鉛）が挙げられている。"},

  {q:"面心立方格子において、原子半径rと単位格子の一辺の長さaの関係式として正しいものはどれか？",
   choices:["r=(√2/4)a","r=(√3/4)a","r=a/2","r=(√2/2)a"], a:0,
   exp:"面心立方格子では面の対角線の長さ√2aが原子半径4個分に相当するので、4r=√2a より r=(√2/4)aとなる。"},

  {q:"面心立方格子で原子半径を求めるとき、一辺の長さaではなく面の対角線に着目するのはなぜか？",
   choices:["一辺で考えても球（原子）が接しておらず、方程式が立てられないため","面の対角線のほうが単位格子内で最も短い距離だから","面心立方格子には対角線しか存在しないため","原子は必ず対角線上に並ぶという規則があるため"], a:0,
   exp:"面心立方格子では一辺の長さで考えても球（原子）が接しておらず方程式を立てられないため、球が接している面の対角線に着目する。"},

  {q:"面心立方格子で、一辺aの正方形の面の対角線の長さはいくらか？",
   choices:["√2a","√3a","2a","a/√2"], a:0,
   exp:"一辺aの正方形の対角線の長さは、三平方の定理より√2aとなる。"},

  {q:"面心立方格子の面の対角線は、原子半径何個分に相当するか？",
   choices:["4個分","2個分","3個分","8個分"], a:0,
   exp:"面の対角線上では原子が接しているため、対角線の長さは原子半径4個分（4r）に相当する。"},

  {q:"体心立方格子において、原子半径rと単位格子の一辺の長さaの関係式として正しいものはどれか？",
   choices:["r=(√3/4)a","r=(√2/4)a","r=a/2","r=(√3/2)a"], a:0,
   exp:"体心立方格子では立方体の対角線の長さ√3aが原子半径4個分に相当するので、4r=√3a より r=(√3/4)aとなる。"},

  {q:"体心立方格子で原子半径を求めるとき、一辺や面の対角線ではなく立体の対角線に着目するのはなぜか？",
   choices:["一辺や面の対角線で考えても球（原子）が接しておらず、方程式が立てられないため","立体の対角線のほうが単位格子内で最も短い距離だから","体心立方格子には立体の対角線しか存在しないため","原子は立体の対角線上でしか接しないという性質があるため"], a:0,
   exp:"体心立方格子では一辺や面の対角線で考えても球（原子）が接しておらず方程式を立てられないため、球が接している立体の対角線に着目する。"},

  {q:"体心立方格子において、一辺aの立方体の対角線の長さはいくらか（三平方の定理より）？",
   choices:["√3a","√2a","2a","a/√3"], a:0,
   exp:"一辺aの立方体の対角線の長さは、三平方の定理より√3aとなる。"},

  {q:"体心立方格子の立体の対角線は、原子半径何個分に相当するか？",
   choices:["4個分","2個分","3個分","8個分"], a:0,
   exp:"立体の対角線上では原子が接しているため、対角線の長さは原子半径4個分（4r）に相当する。"},

  {q:"充填率を求める計算式として正しいものはどれか？",
   choices:["単位格子中の原子の体積 ÷ 単位格子の体積","単位格子の体積 ÷ 単位格子中の原子の体積","単位格子中の原子の数 ÷ 配位数","原子半径 ÷ 単位格子の一辺の長さ"], a:0,
   exp:"充填率は、単位格子中の原子の体積を単位格子の体積で割ることで求められる。"},

  {q:"半径rの球の体積を表す式はどれか？",
   choices:["(4/3)πr³","4πr²","πr³","(4/3)πr²"], a:0,
   exp:"半径rの球の体積は(4/3)πr³である。"},

  {q:"面心立方格子の充填率(74%)が体心立方格子の充填率(68%)より高い理由として最も適切なものはどれか？",
   choices:["面心立方格子のほうが配位数が大きく（12）、原子がより密に詰まっているため","面心立方格子のほうが単位格子の体積が小さいため","面心立方格子のほうが原子半径が大きいため","体心立方格子には原子が存在しない部分が多いため常に68%になるという定義だから"], a:0,
   exp:"面心立方格子は配位数12で体心立方格子（配位数8）より原子が密に詰まっているため、充填率が高くなる。"},

  {q:"鉄の結晶格子は体心立方格子であり、単位格子の一辺の長さは2.9×10⁻¹⁰mである。鉄原子の原子半径は何mか（√3=1.7とする）。",
   choices:["1.2×10⁻¹⁰m","2.9×10⁻¹⁰m","0.73×10⁻¹⁰m","4.9×10⁻¹⁰m"], a:0,
   exp:"体心立方格子ではr=(√3/4)aなので、r=1.7/4×2.9×10⁻¹⁰=1.2×10⁻¹⁰mとなる。"},

  {q:"ある金属の結晶格子は面心立方格子であり、単位格子の一辺の長さは4.0×10⁻¹⁰mである。この金属の原子半径は何mか（√2=1.4とする）。",
   choices:["1.4×10⁻¹⁰m","2.8×10⁻¹⁰m","0.7×10⁻¹⁰m","5.6×10⁻¹⁰m"], a:0,
   exp:"面心立方格子ではr=(√2/4)aなので、r=1.4/4×4.0×10⁻¹⁰=1.4×10⁻¹⁰mとなる。"},

  {q:"イオン結晶の結晶格子が金属結晶よりも種類が多いのはなぜか？",
   choices:["イオン結晶は陽イオンと陰イオンの2種類の粒子からなるため","イオン結晶のほうが融点が高いため","イオン結晶には自由電子が存在するため","イオン結晶は必ず立方体の構造をとるため"], a:0,
   exp:"1種類の原子だけからなる金属結晶と異なり、イオン結晶は陽イオンと陰イオンからなるので、結晶格子の種類が金属結晶よりも多い。"},

  {q:"塩化ナトリウム型構造の単位格子中に含まれるNa⁺イオンは何個か？（1/4×12+1×1）",
   choices:["4個","1個","8個","6個"], a:0,
   exp:"塩化ナトリウム型構造では、Na⁺は1/4×12+1×1=4個含まれる。"},

  {q:"塩化ナトリウム型構造の単位格子中に含まれるCl⁻イオンは何個か？（1/8×8+1/2×6）",
   choices:["4個","1個","8個","12個"], a:0,
   exp:"塩化ナトリウム型構造では、Cl⁻は1/8×8+1/2×6=4個含まれる。"},

  {q:"塩化ナトリウム型構造の組成式はどれか？",
   choices:["NaCl","Na₂Cl","NaCl₂","Na₄Cl₄"], a:0,
   exp:"単位格子中にNa⁺、Cl⁻がそれぞれ4個ずつ含まれるので、その比は1:1となり組成式はNaClである。"},

  {q:"塩化ナトリウム型構造におけるNa⁺、Cl⁻それぞれの配位数はいくつか？",
   choices:["Na⁺:6、Cl⁻:6","Na⁺:8、Cl⁻:8","Na⁺:4、Cl⁻:4","Na⁺:12、Cl⁻:6"], a:0,
   exp:"塩化ナトリウム型構造では、Na⁺、Cl⁻ともに配位数は6である。"},

  {q:"塩化セシウム型構造の単位格子中に含まれるCs⁺イオンとCl⁻イオンはそれぞれ何個か？",
   choices:["Cs⁺:1個、Cl⁻:1個","Cs⁺:4個、Cl⁻:4個","Cs⁺:8個、Cl⁻:1個","Cs⁺:1個、Cl⁻:8個"], a:0,
   exp:"塩化セシウム型構造では、中心のCs⁺が1×1=1個、頂点のCl⁻が1/8×8=1個含まれ、組成式はCsClとなる。"},

  {q:"塩化セシウム型構造のCs⁺、Cl⁻の配位数はそれぞれいくつか？",
   choices:["Cs⁺:8、Cl⁻:8","Cs⁺:6、Cl⁻:6","Cs⁺:12、Cl⁻:12","Cs⁺:4、Cl⁻:4"], a:0,
   exp:"塩化セシウム型構造では、Cs⁺、Cl⁻ともに配位数は8である。"},

let session=[], idx=0, score=0, results=[], studentId="";

document.getElementById("totalBadge").textContent="全"+ALL_Q.length+"問収録";

function shuffle(arr){
  let a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function shuffleChoices(q){
  const order=shuffle([0,1,2,3]);
  return {...q, choices:order.map(i=>q.choices[i]), a:order.indexOf(q.a)};
}

function showOnly(id){
  ["start","quiz","result"].forEach(s=>document.getElementById(s).classList.toggle("hidden",s!==id));
}

function toHalfWidthDigits(s){
  return s.replace(/[０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0));
}

function startQuiz(){
  const idInput=document.getElementById("studentId");
  const normalized=toHalfWidthDigits(idInput.value.trim());
  if(!/^(20(0[0-9]|10)|1[1-6](0[1-9]|[1-3][0-9]|40))$/.test(normalized)){
    alert("学籍番号が正しくありません。\n1桁目は学年「1」、2桁目は組「1〜6」、3・4桁目は出席番号「01〜40」です（例：1年1組4番→1104）。");
    idInput.focus();
    return;
  }
  idInput.value=normalized;
  studentId=normalized;
  session=shuffle(ALL_Q).slice(0,10).map(shuffleChoices);
  idx=0; score=0; results=[];
  showOnly("quiz");
  renderQ();
}

function renderQ(){
  const q=session[idx];
  document.getElementById("pbar").style.width=((idx)/10*100)+"%";
  document.getElementById("qnum").textContent=(idx+1)+"/10";
  document.getElementById("qtext").textContent=q.q;
  document.getElementById("exp").style.display="none";
  document.getElementById("nextBtn").style.display="none";

  const ci=document.getElementById("choices");
  ci.innerHTML="";
  q.choices.forEach((c,i)=>{
    const btn=document.createElement("button");
    btn.className="choice-btn";
    btn.textContent=c;
    btn.onclick=()=>select(i);
    ci.appendChild(btn);
  });
}

function select(chosen){
  const q=session[idx];
  const btns=document.querySelectorAll(".choice-btn");
  btns.forEach(b=>{b.disabled=true;b.onclick=null;});
  btns[chosen].classList.add(chosen===q.a?"correct":"wrong");
  if(chosen!==q.a) btns[q.a].classList.add("correct");

  if(chosen===q.a) score++;
  results.push({q:q.q,correct:chosen===q.a,yourAns:q.choices[chosen],rightAns:q.choices[q.a],exp:q.exp});

  const expBox=document.getElementById("exp");
  expBox.textContent=q.exp;
  expBox.style.display="block";
  document.getElementById("nextBtn").style.display="block";
  document.getElementById("nextBtn").textContent=idx===9?"結果を見る":"次の問題へ →";
}

function next(){
  idx++;
  if(idx>=10){showResult();return;}
  renderQ();
}

function showResult(){
  showOnly("result");
  document.getElementById("scoreBig").textContent=score;

  const pct=score/10*100;
  const color=score>=8?"#48bb78":score>=6?"#4299e1":score>=4?"#ed8936":"#fc8181";
  const arc=document.getElementById("donut-arc");
  arc.setAttribute("stroke",color);
  arc.setAttribute("stroke-dasharray",pct+" "+(100-pct));

  const passed=score>=PASS_THRESHOLD;
  const passBadge=document.getElementById("passBadge");
  passBadge.textContent=passed?"合格":"不合格";
  passBadge.className="pass-badge "+(passed?"pass":"fail");

  const list=document.getElementById("reviewList");
  list.innerHTML="";
  results.forEach((r,i)=>{
    const div=document.createElement("div");
    div.className="review-item"+(r.correct?"":" miss");
    div.innerHTML=`<div class="rq">${i+1}. ${r.q}</div>
      <div class="ra">${r.correct?"✓ 正解："+r.rightAns:"✗ あなたの答え："+r.yourAns+" → 正解："+r.rightAns}</div>
      <div class="ra" style="margin-top:4px;color:#7b341e">${r.exp}</div>`;
    list.appendChild(div);
  });

  submitResult();
}

function submitResult(){
  const statusEl=document.getElementById("submitStatus");
  if(!SUBMIT_URL){
    statusEl.textContent="※送信先が未設定のため、この結果は記録されていません";
    return;
  }
  const payload={
    studentId:studentId,
    quizName:QUIZ_NAME,
    score:score,
    total:10,
    passed:score>=PASS_THRESHOLD?"合格":"不合格",
    timestamp:new Date().toISOString(),
    missed:results.filter(r=>!r.correct).map(r=>r.q)
  };
  try{
    fetch(SUBMIT_URL,{
      method:"POST",
      mode:"no-cors",
      headers:{"Content-Type":"text/plain;charset=utf-8"},
      body:JSON.stringify(payload)
    });
    statusEl.textContent="学籍番号: "+studentId+"｜記録しました";
  }catch(err){
    statusEl.textContent="※通信エラーのため記録できませんでした";
  }
}
