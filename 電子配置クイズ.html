<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>電子配置クイズ</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Hiragino Kaku Gothic Pro', Meiryo, sans-serif;
      background: #f0f4ff; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    #app { width: 100%; max-width: 680px; padding: 16px; }

    .screen { display: none; }
    .screen.active { display: block; }

    .card {
      background: #fff; border-radius: 16px; padding: 32px;
      box-shadow: 0 4px 20px rgba(0,0,0,.08);
    }
    h1 { color: #2c3e50; font-size: 1.6rem; margin-bottom: 8px; text-align: center; }
    .subtitle { color: #666; text-align: center; margin-bottom: 24px; font-size: .95rem; }
    .info-box {
      background: #eef2ff; border-radius: 10px; padding: 16px;
      margin-bottom: 24px; font-size: .9rem; line-height: 1.8; color: #444;
    }

    .btn {
      display: block; width: 100%; padding: 14px; border: none;
      border-radius: 10px; font-size: 1rem; font-weight: bold;
      cursor: pointer; transition: all .2s;
    }
    .btn-primary { background: #4f46e5; color: #fff; }
    .btn-secondary { background: #e5e7eb; color: #374151; margin-top: 10px; }
    .home-link { display: block; text-align: center; margin-top: 14px; color: #4f46e5; font-size: .85rem; text-decoration: none; }
    .home-link:hover { text-decoration: underline; }
    @media (hover: hover) {
      .btn-primary:hover { background: #4338ca; transform: translateY(-1px); }
      .btn-secondary:hover { background: #d1d5db; }
    }

    .id-label { display: block; font-size: .85rem; font-weight: 600; color: #374151; margin-bottom: 6px; text-align: left; }
    .id-input { width: 100%; padding: 12px 14px; border: 2px solid #e5e7eb; border-radius: 10px; font-size: .95rem; margin-bottom: 20px; }
    .id-input:focus { outline: none; border-color: #4f46e5; }
    .submit-status { margin-top: 14px; text-align: center; font-size: .8rem; color: #9ca3af; }

    .progress-text {
      display: flex; justify-content: space-between;
      font-size: .85rem; color: #666; margin-bottom: 6px;
    }
    .progress-bar {
      background: #e5e7eb; border-radius: 99px;
      height: 8px; margin-bottom: 20px; overflow: hidden;
    }
    .progress-fill {
      background: #4f46e5; height: 100%;
      border-radius: 99px; transition: width .3s;
    }

    .tag {
      display: inline-block; background: #eef2ff; color: #4f46e5;
      border-radius: 99px; padding: 3px 12px;
      font-size: .8rem; margin-bottom: 14px;
    }
    .tag.thinking { background: #fef3c7; color: #d97706; }
    .tag.vocab    { background: #dcfce7; color: #15803d; }

    .question-text {
      font-size: 1.15rem; font-weight: bold; color: #1f2937;
      margin-bottom: 20px; line-height: 1.6;
    }

    .choices { display: flex; flex-direction: column; gap: 10px; }
    .choice {
      padding: 14px 16px; border: 2px solid #e5e7eb; border-radius: 10px;
      cursor: pointer; transition: all .15s; background: #fff;
      text-align: left; font-size: .95rem; color: #374151; width: 100%;
    }
    @media (hover: hover) {
      .choice:not(:disabled):hover { border-color: #4f46e5; background: #f5f3ff; }
    }
    .choice.correct  { border-color: #10b981; background: #d1fae5; color: #065f46; }
    .choice.wrong    { border-color: #ef4444; background: #fee2e2; color: #991b1b; }
    .choice.reveal   { border-color: #10b981; background: #d1fae5; color: #065f46; }
    .choice:disabled { cursor: default; }
    .choice:disabled:not(.correct):not(.wrong):not(.reveal) { opacity: .5; }

    .explanation {
      margin-top: 16px; padding: 14px;
      background: #f8fafc; border-left: 4px solid #4f46e5;
      border-radius: 0 8px 8px 0; font-size: .9rem;
      line-height: 1.7; color: #374151;
    }
    .btn-next { margin-top: 16px; }

    .result-title {
      text-align: center; font-size: 1.5rem;
      font-weight: bold; color: #1f2937; margin-bottom: 8px;
    }
    .donut-wrap { display: flex; justify-content: center; margin: 20px 0; }
    .score-label { text-align: center; margin-bottom: 20px; }
    .score-big  { font-size: 2.5rem; font-weight: bold; color: #4f46e5; }
    .score-small { font-size: 1rem; color: #666; }

    .review-item {
      background: #fff; border-radius: 10px; padding: 14px;
      margin-bottom: 10px; border-left: 4px solid #ef4444;
    }
    .review-item.correct { border-left-color: #10b981; }
    .review-q   { font-size: .9rem; font-weight: bold; color: #1f2937; margin-bottom: 4px; }
    .review-ans { font-size: .85rem; color: #555; }
    .review-exp { font-size: .82rem; color: #666; margin-top: 4px; line-height: 1.5; }
  </style>
</head>
<body>
<div id="app">

  <!-- ── スタート画面 ── -->
  <div id="s-start" class="screen active">
    <div class="card">
      <h1>電子配置クイズ</h1>
      <p class="subtitle">第1編第2章「物質の構成粒子」</p>
      <div class="info-box">
        全43問からランダムに <strong>10問</strong> 出題<br>
        🔵 知識問題6問 ＋ 🟢 用語問題2問 ＋ 🟡 思考力問題2問<br>
        電子殻・電子配置・価電子・貴ガスを確認しよう
      </div>
      <p id="best-score" style="text-align:center;color:#4f46e5;font-size:.9rem;margin-bottom:14px;"></p>
      <label class="id-label" for="studentId">学籍番号（学年・組・出席番号を半角4桁で／例：1年1組4番→1104）</label>
      <input class="id-input" id="studentId" placeholder="1104" inputmode="numeric" maxlength="4">
      <button class="btn btn-primary" onclick="startQuiz()">スタート</button>
    </div>
  </div>

  <!-- ── クイズ画面 ── -->
  <div id="s-quiz" class="screen">
    <div class="card">
      <div class="progress-text">
        <span id="q-num">問1 / 10</span>
        <span id="q-score">正解: 0</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="prog" style="width:0%"></div>
      </div>
      <span class="tag" id="q-tag">知識</span>
      <p class="question-text" id="q-text"></p>
      <div class="choices" id="q-choices"></div>
      <div class="explanation" id="q-exp" style="display:none"></div>
      <button class="btn btn-primary btn-next" id="btn-next"
              style="display:none" onclick="next()">次の問題 →</button>
    </div>
  </div>

  <!-- ── 結果画面 ── -->
  <div id="s-result" class="screen">
    <div class="card">
      <p class="result-title">結果</p>
      <div class="donut-wrap">
        <canvas id="donut" width="160" height="160"></canvas>
      </div>
      <div class="score-label">
        <span class="score-big" id="r-score">0</span>
        <span class="score-small"> / 10 問正解</span>
      </div>
      <p id="r-msg" style="text-align:center;color:#666;margin-bottom:16px;"></p>
      <div id="r-review"></div>
      <button class="btn btn-primary" style="margin-top:16px" onclick="startQuiz()">もう一度</button>
      <div class="submit-status" id="submitStatus"></div>
      <a href="index.html" class="home-link">← クイズ一覧に戻る</a>
    </div>
  </div>

</div>

<script>
const SUBMIT_URL = "https://script.google.com/macros/s/AKfycbzpQloDrnluceZVUFyLruPKE8PVOENnG-u_yfrsGx90bqVSfDtxNdxViJ1JhfQA7Bv3Dw/exec";

// ── クイズ状態 ──
let session = [], idx = 0, score = 0, results = [], studentId = "";
const BEST_KEY = 'quiz-denshihaichi-best';

// スタート画面に自己ベストを表示
(function showBest() {
  try {
    const best = localStorage.getItem(BEST_KEY);
    if (best !== null) {
      document.getElementById('best-score').textContent = `🏆 自己ベスト: ${best} / 10`;
    }
  } catch (e) { /* 記録なし・使用不可なら何も表示しない */ }
})();

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function showOnly(id) {
  ['s-start', 's-quiz', 's-result'].forEach(s => {
    document.getElementById(s).classList.toggle('active', s === id);
  });
}

function toHalfWidthDigits(s) {
  return s.replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0));
}

function startQuiz() {
  const idInput = document.getElementById('studentId');
  const normalized = toHalfWidthDigits(idInput.value.trim());
  if (!/^[0-9]{4}$/.test(normalized)) {
    alert('学籍番号は半角数字4桁で入力してください（例：1年1組4番→1104）。');
    idInput.focus();
    return;
  }
  idInput.value = normalized;
  studentId = normalized;
  // 毎回：思考力2問＋用語2問＋知識6問 = 10問（セッション内でシャッフル）
  const thinking  = shuffle(ALL_Q.filter(q => q.type === '思考力'));
  const vocab     = shuffle(ALL_Q.filter(q => q.type === '用語'));
  const knowledge = shuffle(ALL_Q.filter(q => q.type === '知識'));

  // 同じ概念(group)の問題が同一セッションに重複しないようにする
  const picked = [...thinking.slice(0, 2), ...vocab.slice(0, 2)];
  const usedGroups = new Set(picked.map(q => q.group).filter(Boolean));
  const knowledgePicked = [];
  for (const q of knowledge) {
    if (knowledgePicked.length >= 6) break;
    if (q.group && usedGroups.has(q.group)) continue;
    if (q.group) usedGroups.add(q.group);
    knowledgePicked.push(q);
  }

  // 各問題の選択肢をシャッフルし、正解位置を追従させる
  session = shuffle([...picked, ...knowledgePicked]).map(q => {
    const order = shuffle(q.choices.map((_, i) => i));
    return {
      ...q,
      choices: order.map(i => q.choices[i]),
      a: order.indexOf(q.a)
    };
  });

  idx = 0; score = 0; results = [];
  renderQ();
  showOnly('s-quiz');
}

function renderQ() {
  const q = session[idx];
  document.getElementById('q-num').textContent   = `問${idx + 1} / ${session.length}`;
  document.getElementById('q-score').textContent = `正解: ${score}`;
  document.getElementById('prog').style.width    = `${(idx / session.length) * 100}%`;

  const tagEl = document.getElementById('q-tag');
  tagEl.textContent = q.type;
  tagEl.className   = 'tag'
    + (q.type === '思考力' ? ' thinking' : q.type === '用語' ? ' vocab' : '');

  document.getElementById('q-text').textContent = q.q;
  document.getElementById('q-exp').style.display  = 'none';
  document.getElementById('btn-next').style.display = 'none';

  const choicesEl = document.getElementById('q-choices');
  choicesEl.innerHTML = '';
  q.choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice';
    btn.textContent = c;
    btn.onclick = () => select(i);
    choicesEl.appendChild(btn);
  });
}

function select(chosen) {
  const q = session[idx];
  const btns = document.querySelectorAll('.choice');
  btns.forEach(b => { b.onclick = null; b.disabled = true; });

  // 回答した時点で進捗バーを更新（最終問題で100%になる）
  document.getElementById('prog').style.width =
    `${((idx + 1) / session.length) * 100}%`;

  const correct = chosen === q.a;
  if (correct) score++;

  btns[chosen].classList.add(correct ? 'correct' : 'wrong');
  if (!correct) btns[q.a].classList.add('reveal');

  const expEl = document.getElementById('q-exp');
  expEl.textContent  = q.exp;
  expEl.style.display = 'block';

  results.push({ q, chosen, correct });

  const nextBtn = document.getElementById('btn-next');
  nextBtn.style.display = 'block';
  nextBtn.textContent   = idx + 1 < session.length ? '次の問題 →' : '結果を見る';
}

function next() {
  idx++;
  if (idx < session.length) {
    renderQ();
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById('r-score').textContent = score;
  const pct = score / session.length;
  let msg = pct === 1   ? '満点！完璧です！'
          : pct >= 0.8  ? 'よくできました！'
          : pct >= 0.6  ? 'もう少しです。'
          : '復習しましょう！';

  // 自己ベストの保存（localStorageが使えない環境でも動作は継続）
  try {
    const best = Number(localStorage.getItem(BEST_KEY) || -1);
    if (score > best) {
      localStorage.setItem(BEST_KEY, score);
      if (best >= 0) msg += ' 🎉 自己ベスト更新！';
    } else if (best >= 0) {
      msg += `（自己ベスト: ${best}/10）`;
    }
  } catch (e) { /* プライベートモード等では記録しない */ }

  document.getElementById('r-msg').textContent = msg;

  // ドーナツグラフ
  const canvas = document.getElementById('donut');
  const ctx = canvas.getContext('2d');
  const cx = 80, cy = 80, r = 65, lw = 18;
  ctx.clearRect(0, 0, 160, 160);
  ctx.lineWidth = lw;
  ctx.lineCap = 'round';
  ctx.strokeStyle = '#e5e7eb';
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.stroke();
  if (score > 0) {
    ctx.strokeStyle = '#4f46e5';
    ctx.beginPath();
    ctx.arc(cx, cy, r, -Math.PI / 2,
            -Math.PI / 2 + (Math.PI * 2 * score / session.length));
    ctx.stroke();
  }
  ctx.fillStyle = '#1f2937';
  ctx.font = 'bold 28px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(`${score}/${session.length}`, cx, cy);

  // 振り返りリスト
  const reviewEl = document.getElementById('r-review');
  reviewEl.innerHTML = '<p style="font-weight:bold;margin-bottom:10px;color:#374151;">問題の振り返り</p>';
  results.forEach((r, i) => {
    const div = document.createElement('div');
    div.className = 'review-item' + (r.correct ? ' correct' : '');
    div.innerHTML = `
      <div class="review-q">問${i + 1}. ${r.q.q}</div>
      <div class="review-ans">
        ${r.correct
          ? '&#x2705; 正解'
          : `&#x274C; あなたの答え：${r.q.choices[r.chosen]}　→　正解：${r.q.choices[r.q.a]}`}
      </div>
      <div class="review-exp">${r.q.exp}</div>
    `;
    reviewEl.appendChild(div);
  });

  showOnly('s-result');
  submitResult();
}

function submitResult() {
  const statusEl = document.getElementById('submitStatus');
  if (!SUBMIT_URL) {
    statusEl.textContent = '※送信先が未設定のため、この結果は記録されていません';
    return;
  }
  const payload = {
    studentId: studentId,
    quizName: QUIZ_NAME,
    score: score,
    total: session.length,
    passed: score >= PASS_THRESHOLD ? '合格' : '不合格',
    timestamp: new Date().toISOString(),
    missed: results.filter(r => !r.correct).map(r => r.q.q)
  };
  try {
    fetch(SUBMIT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    });
    statusEl.textContent = '学籍番号: ' + studentId + '｜記録しました';
  } catch (err) {
    statusEl.textContent = '※通信エラーのため記録できませんでした';
  }
}
